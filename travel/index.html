<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="0; url=/es/" />
    <title>Serendia</title>
    <script>
      (function () {
        try {
          var supportedLocales = ["es", "en", "pt"];
          var storedLocale = window.localStorage.getItem("NEXT_LOCALE");
          var locale = supportedLocales.indexOf(storedLocale) >= 0 ? storedLocale : "es";
          window.location.replace("/" + locale + "/");
        } catch (error) {
          window.location.replace("/es/");
        }
      })();
    </script>
  </head>
  <body>
    <p>Redirecting to <a href="/es/">Serendia</a>...</p>
  </body>
</html>
